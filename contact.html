<!DOCTYPE html>
<html lang="en" class="page-contact">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact — Brielle Picard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="main.js" defer></script>
  </head>
  <body class="page-contact">
    <div
      class="top-chrome top-chrome--always top-chrome--contact-only"
      id="topChrome"
      aria-hidden="false"
    >
      <header class="site-nav site-nav--contact">
        <a href="index.html" class="site-nav__brand wave-name" data-home-link>
          <span class="wave-name__letters" aria-label="Brielle Picard">
            <span style="--i: 0">B</span><span style="--i: 1">r</span
            ><span style="--i: 2">i</span><span style="--i: 3">e</span
            ><span style="--i: 4">l</span><span style="--i: 5">l</span
            ><span style="--i: 6">e</span><span class="wave-name__gap"></span
            ><span style="--i: 7">P</span><span style="--i: 8">i</span
            ><span style="--i: 9">c</span><span style="--i: 10">a</span
            ><span style="--i: 11">r</span><span style="--i: 12">d</span>
          </span>
        </a>
        <nav class="site-nav__links" aria-label="Primary">
          <a href="index.html" class="js-home-top" data-home-link>Home</a>
          <a href="work.html">Projects</a>
          <a href="about.html">About</a>
          <a
            href="assets/resume.pdf"
            download="Brielle-Picard-Resume.pdf"
            type="application/pdf"
            data-resume-download
            target="_blank"
            rel="noopener noreferrer"
            >Resume</a
          >
          <a href="contact.html" aria-current="page">Contact</a>
        </nav>
      </header>
    </div>

    <main class="contact-main" id="main">
      <div class="contact-stage" aria-label="Contact card">
        <article class="contact-card">
          <div class="contact-card__glow" aria-hidden="true"></div>
          <div class="contact-card__trace" aria-hidden="true"></div>

          <figure class="contact-card__photo">
            <img
              src="assets/brielle-picard.jpg"
              width="480"
              height="640"
              alt="Brielle Picard"
              loading="eager"
            />
          </figure>

          <div class="contact-card__body">
            <p class="contact-card__eyebrow">Open to opportunities</p>
            <h1 class="contact-card__name">Brielle Picard</h1>
            <p class="contact-card__role">
              Digital experience · AI · product &amp; growth work — open across industries
            </p>

            <ul class="contact-card__list" aria-label="Contact details">
              <li>
                <span class="contact-card__label">Email</span>
                <a href="mailto:briellepicard@icloud.com">briellepicard@icloud.com</a>
              </li>
              <li>
                <span class="contact-card__label">Phone</span>
                <a href="tel:+19783370817">(978) 337-0817</a>
              </li>
              <li>
                <span class="contact-card__label">LinkedIn</span>
                <a
                  href="https://www.linkedin.com/in/brielle-picard-4519b7318"
                  target="_blank"
                  rel="noopener noreferrer"
                  >brielle-picard</a
                >
              </li>
            </ul>

            <div class="contact-card__actions">
              <a class="contact-card__btn contact-card__btn--primary" href="mailto:briellepicard@icloud.com"
                >Email me</a
              >
              <a
                class="contact-card__btn"
                href="assets/resume.pdf"
                download="Brielle-Picard-Resume.pdf"
                type="application/pdf"
                data-resume-download
                target="_blank"
                rel="noopener noreferrer"
                >Download resume</a
              >
            </div>
          </div>
        </article>
      </div>
    </main>
  </body>
</html>

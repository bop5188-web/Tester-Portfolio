<!DOCTYPE html>
<html lang="en" class="page-work">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Work — Brielle Picard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="main.js" defer></script>
  </head>
  <body class="page-work">
    <div
      class="top-chrome top-chrome--always top-chrome--work-only"
      id="topChrome"
      aria-hidden="false"
    >
      <header class="site-nav site-nav--work">
        <a href="index.html" class="site-nav__brand wave-name" data-home-link>
          <span class="wave-name__letters" aria-label="Brielle Picard">
            <span style="--i: 0">B</span><span style="--i: 1">r</span
            ><span style="--i: 2">i</span><span style="--i: 3">e</span
            ><span style="--i: 4">l</span><span style="--i: 5">l</span
            ><span style="--i: 6">e</span><span class="wave-name__gap"></span
            ><span style="--i: 7">P</span><span style="--i: 8">i</span
            ><span style="--i: 9">c</span><span style="--i: 10">a</span
            ><span style="--i: 11">r</span><span style="--i: 12">d</span>
          </span>
        </a>
        <nav class="site-nav__links">
          <a href="index.html" class="js-home-top" data-home-link>Home</a>
        </nav>
      </header>
    </div>

    <main class="work-page-main" id="workMain">
      <ul class="work-mini-grid" role="list">
        <li class="work-mini-card-wrap" style="--f: 0">
          <a class="work-mini-card" href="work/project-alpha.html">
            <span class="work-mini-card__title">Project Alpha</span>
            <div class="work-mini-card__media">
              <img
                src="https://picsum.photos/seed/bp-alpha/400/240"
                alt=""
                width="400"
                height="240"
                loading="lazy"
                decoding="async"
              />
            </div>
          </a>
        </li>
        <li class="work-mini-card-wrap" style="--f: 1">
          <a class="work-mini-card" href="work/project-beta.html">
            <span class="work-mini-card__title">Project Beta</span>
            <div class="work-mini-card__media">
              <img
                src="https://picsum.photos/seed/bp-beta/400/240"
                alt=""
                width="400"
                height="240"
                loading="lazy"
                decoding="async"
              />
            </div>
          </a>
        </li>
        <li class="work-mini-card-wrap" style="--f: 2">
          <a class="work-mini-card" href="work/project-gamma.html">
            <span class="work-mini-card__title">Project Gamma</span>
            <div class="work-mini-card__media">
              <img
                src="https://picsum.photos/seed/bp-gamma/400/240"
                alt=""
                width="400"
                height="240"
                loading="lazy"
                decoding="async"
              />
            </div>
          </a>
        </li>
        <li class="work-mini-card-wrap" style="--f: 3">
          <a class="work-mini-card" href="work/project-delta.html">
            <span class="work-mini-card__title">Project Delta</span>
            <div class="work-mini-card__media">
              <img
                src="https://picsum.photos/seed/bp-delta/400/240"
                alt=""
                width="400"
                height="240"
                loading="lazy"
                decoding="async"
              />
            </div>
          </a>
        </li>
        <li class="work-mini-card-wrap" style="--f: 4">
          <a class="work-mini-card" href="work/project-epsilon.html">
            <span class="work-mini-card__title">Project Epsilon</span>
            <div class="work-mini-card__media">
              <img
                src="https://picsum.photos/seed/bp-epsilon/400/240"
                alt=""
                width="400"
                height="240"
                loading="lazy"
                decoding="async"
              />
            </div>
          </a>
        </li>
      </ul>
    </main>

    <div
      class="work-platform"
      id="workPlatform"
      aria-hidden="true"
    >
      <div class="work-platform__blobs">
        <div class="work-platform__blob work-platform__blob--1"></div>
        <div class="work-platform__blob work-platform__blob--2"></div>
        <div class="work-platform__blob work-platform__blob--3"></div>
      </div>
      <div class="work-platform__rim"></div>
    </div>

    <div
      id="caseStudyCursor"
      class="case-study-cursor case-study-cursor--dark"
      aria-hidden="true"
    >
      <span class="case-study-cursor__circle"></span>
      <span class="case-study-cursor__arrow"></span>
    </div>
  </body>
</html>

<!DOCTYPE html>
<html lang="en" class="page-home">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brielle Picard — Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script
      type="module"
      src="https://unpkg.com/@splinetool/viewer@1.12.70/build/spline-viewer.js"
    ></script>
    <script src="main.js" defer></script>
  </head>
  <body>
    <div
      class="top-chrome"
      id="topChrome"
      aria-hidden="true"
    >
      <header class="site-nav site-nav--home">
        <a href="index.html" class="site-nav__brand wave-name" data-home-link>
          <span class="wave-name__letters" aria-label="Brielle Picard">
            <span style="--i: 0">B</span><span style="--i: 1">r</span
            ><span style="--i: 2">i</span><span style="--i: 3">e</span
            ><span style="--i: 4">l</span><span style="--i: 5">l</span
            ><span style="--i: 6">e</span><span class="wave-name__gap"></span
            ><span style="--i: 7">P</span><span style="--i: 8">i</span
            ><span style="--i: 9">c</span><span style="--i: 10">a</span
            ><span style="--i: 11">r</span><span style="--i: 12">d</span>
          </span>
        </a>
        <nav class="site-nav__links">
          <a href="work.html">Work</a>
          <a href="index.html" class="js-home-top" data-home-link>Home</a>
        </nav>
      </header>
      <div
        class="case-scroll-track case-scroll-track--minimal"
        id="caseScrollTrack"
      >
        <div
          class="case-scroll-track__rail"
          role="progressbar"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="0"
          aria-label="Scroll progress on this page"
        >
          <div class="case-scroll-track__fill" id="caseScrollFill"></div>
        </div>
      </div>
    </div>

    <div class="home-hero">
      <spline-viewer
        url="https://prod.spline.design/DETcUaJwXMnaTceU/scene.splinecode"
      ></spline-viewer>

      <a class="scroll-into-work" href="#main">
        <span class="scroll-into-work__text">Scroll</span>
        <span class="scroll-into-work__chev" aria-hidden="true"></span>
      </a>
    </div>

    <main id="main" class="home-below">
      <div class="home-below__intro">
        <p class="home-below__lede">
          Five case studies below — scroll slowly; each one locks to the
          viewport like a slide. Click to open a panel for the full page.
        </p>
        <p class="home-below__aside">
          <a class="home-below__aside-link" href="work.html">Work index</a>
        </p>
      </div>

      <section class="case-study-stack" aria-label="Case studies">
        <article class="case-study-slide" style="--float: 0">
          <button
            type="button"
            class="case-study-slide__hit case-hit"
            data-case-url="work/project-alpha.html"
            data-case-title="Project Alpha"
            aria-label="Open Project Alpha — full case study"
          >
            <span class="case-study-slide__label">01 / 05</span>
            <span class="case-study-slide__title">Project Alpha</span>
            <span class="case-study-slide__hint">Open full case study</span>
          </button>
        </article>
        <article class="case-study-slide" style="--float: 1">
          <button
            type="button"
            class="case-study-slide__hit case-hit"
            data-case-url="work/project-beta.html"
            data-case-title="Project Beta"
            aria-label="Open Project Beta — full case study"
          >
            <span class="case-study-slide__label">02 / 05</span>
            <span class="case-study-slide__title">Project Beta</span>
            <span class="case-study-slide__hint">Open full case study</span>
          </button>
        </article>
        <article class="case-study-slide" style="--float: 2">
          <button
            type="button"
            class="case-study-slide__hit case-hit"
            data-case-url="work/project-gamma.html"
            data-case-title="Project Gamma"
            aria-label="Open Project Gamma — full case study"
          >
            <span class="case-study-slide__label">03 / 05</span>
            <span class="case-study-slide__title">Project Gamma</span>
            <span class="case-study-slide__hint">Open full case study</span>
          </button>
        </article>
        <article class="case-study-slide" style="--float: 3">
          <button
            type="button"
            class="case-study-slide__hit case-hit"
            data-case-url="work/project-delta.html"
            data-case-title="Project Delta"
            aria-label="Open Project Delta — full case study"
          >
            <span class="case-study-slide__label">04 / 05</span>
            <span class="case-study-slide__title">Project Delta</span>
            <span class="case-study-slide__hint">Open full case study</span>
          </button>
        </article>
        <article class="case-study-slide" style="--float: 4">
          <button
            type="button"
            class="case-study-slide__hit case-hit"
            data-case-url="work/project-epsilon.html"
            data-case-title="Project Epsilon"
            aria-label="Open Project Epsilon — full case study"
          >
            <span class="case-study-slide__label">05 / 05</span>
            <span class="case-study-slide__title">Project Epsilon</span>
            <span class="case-study-slide__hint">Open full case study</span>
          </button>
        </article>
      </section>
    </main>

    <footer id="contact" class="site-footer">
      <p class="footer-text">
        <a href="mailto:you@example.com">you@example.com</a>
        ·
        <a href="https://github.com/yourusername" rel="noopener noreferrer"
          >GitHub</a
        >
      </p>
    </footer>

    <div
      id="caseStudyPanel"
      class="case-study-panel"
      hidden
      aria-hidden="true"
    >
      <div class="case-study-panel__backdrop" data-close-case-panel></div>
      <div
        class="case-study-panel__shell"
        role="dialog"
        aria-modal="true"
        aria-labelledby="caseStudyPanelHeading"
      >
        <div class="case-study-panel__chrome">
          <h2 id="caseStudyPanelHeading" class="case-study-panel__heading">
            Case study
          </h2>
          <button
            type="button"
            class="case-study-panel__close"
            data-close-case-panel
            aria-label="Close panel"
          >
            Close
          </button>
        </div>
        <iframe
          class="case-study-panel__frame"
          title="Case study"
          src="about:blank"
        ></iframe>
      </div>
    </div>

    <div
      id="caseStudyCursor"
      class="case-study-cursor"
      aria-hidden="true"
    >
      <span class="case-study-cursor__circle"></span>
      <span class="case-study-cursor__arrow"></span>
    </div>
  </body>
</html>
